[package]
name = "flexplore"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18", features = ["serialize"] }
bevy_egui = "0.39"
rand = "0.8"
getrandom = { version = "0.2", features = ["js"] }
getrandom_0_3 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }
strum = { version = "0.28.0", features = ["derive"] }
anyhow = "1.0.102"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
