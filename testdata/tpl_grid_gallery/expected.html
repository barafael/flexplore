<!DOCTYPE html>
<html>
<head>
<style>
html, body {
  margin: 0;
  height: 100%;
}
body {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

.node-0 {
  display: grid;
  grid-template-columns: 1.0fr 1.0fr 1.0fr 1.0fr;
  grid-auto-rows: 120px;
  align-items: flex-start;
  align-content: flex-start;
  row-gap: 8.0px;
  column-gap: 8.0px;
  flex-grow: 1;
  width: 100.0%;
  min-height: 0.0px;
  padding: 8.0px;
  background: rgba(28, 28, 43, 1);
  box-sizing: border-box;
}

.node-1 {
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  align-content: flex-start;
  row-gap: 4.0px;
  column-gap: 4.0px;
  grid-column: span 2;
  padding: 8.0px;
  background: rgb(251, 180, 174);
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(13, 13, 26, 0.85);
  font-size: 26px;
}

.node-2 {
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  align-content: flex-start;
  row-gap: 4.0px;
  column-gap: 4.0px;
  padding: 8.0px;
  background: rgb(179, 205, 227);
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(13, 13, 26, 0.85);
  font-size: 26px;
}

.node-3 {
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  align-content: flex-start;
  row-gap: 4.0px;
  column-gap: 4.0px;
  padding: 8.0px;
  background: rgb(204, 235, 197);
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(13, 13, 26, 0.85);
  font-size: 26px;
}

.node-4 {
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  align-content: flex-start;
  row-gap: 4.0px;
  column-gap: 4.0px;
  grid-row: span 2;

.node-5 {

  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(13, 13, 26, 0.85);

.node-6 {

</style>
</head>
<body>
<div class="node-0">
  <div class="node-1">wide</div>
  <div class="node-2">img-1</div>
  <div class="node-3">img-2</div>
