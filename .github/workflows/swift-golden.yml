name: Swift Golden Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/flexplore-core/src/**'
      - 'tools/build-overview/**'
      - 'tools/swift-golden/**'
      - '.github/workflows/swift-golden.yml'

permissions:
  contents: write

concurrency:
  group: swift-golden-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Render Swift golden screenshots and rebuild overview
        run: cargo run -p build-overview -- --backend swift

      - name: Commit rendered PNGs and overview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}"
          git add testdata/*/rendered_swift.png testdata/overview.html
          git diff --cached --quiet || git commit -m "Update Swift golden screenshots"
          git push
