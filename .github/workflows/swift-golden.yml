name: Swift Golden Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'testdata/*/expected.swift'
      - 'src/codegen/swiftui.rs'
      - 'tools/swift-golden/**'
      - '.github/workflows/swift-golden.yml'

permissions:
  contents: write

concurrency:
  group: swift-golden-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Render Swift golden screenshots and rebuild overview
        run: cargo run -p build-overview -- --backend swift

      - name: Commit rendered PNGs and overview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add testdata/*/rendered_swift.png testdata/overview.html
          git diff --cached --quiet || git commit -m "Update Swift golden screenshots"
          git push
