name: Swift Golden Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'testdata/*/expected.swift'
      - 'src/codegen/swiftui.rs'
      - 'scripts/swift_golden/**'
      - 'scripts/render_swift.sh'

permissions:
  contents: write

concurrency:
  group: swift-golden-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Render Swift golden screenshots
        run: bash scripts/render_swift.sh

      - name: Commit rendered PNGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add testdata/*/rendered_swift.png
          git diff --cached --quiet || git commit -m "Update Swift golden screenshots"
          git push
